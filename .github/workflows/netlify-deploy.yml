name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Package site files
        run: |
          mkdir -p dist
          cp index.html property.html dist/
          cp -r css js dist/
          cp -r images dist/ 2>/dev/null || true
          cd dist && zip -r ../site.zip .
          echo "Site packaged: $(du -sh ../site.zip | cut -f1)"

      - name: Create or reuse Netlify site
        id: netlify_site
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          if [ -f ".netlify/state.json" ]; then
            SITE_ID=$(python3 -c "import json; print(json.load(open('.netlify/state.json'))['siteId'])")
            SITE_URL=$(curl -sf "https://api.netlify.com/api/v1/sites/$SITE_ID" \
              -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ssl_url',d.get('url','')))")
            echo "Reusing site: $SITE_URL"
          else
            echo "Creating new Netlify site..."
            SITE=$(curl -sf -X POST "https://api.netlify.com/api/v1/sites" \
              -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name":"abadi-realestate-sa"}')
            SITE_ID=$(echo "$SITE" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
            SITE_URL=$(echo "$SITE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ssl_url',d.get('url','')))")
            echo "Created: $SITE_URL"
            mkdir -p .netlify
            python3 -c "import json; json.dump({'siteId':'$SITE_ID'}, open('.netlify/state.json','w'))"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .netlify/state.json
            git commit -m "chore: save Netlify site ID [skip ci]" || true
            git push origin main || true
          fi
          echo "site_id=$SITE_ID" >> $GITHUB_OUTPUT
          echo "site_url=$SITE_URL" >> $GITHUB_OUTPUT

      - name: Deploy zip to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          SITE_ID="${{ steps.netlify_site.outputs.site_id }}"
          SITE_URL="${{ steps.netlify_site.outputs.site_url }}"

          DEPLOY=$(curl -sf -X POST "https://api.netlify.com/api/v1/sites/$SITE_ID/deploys" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary "@site.zip")

          DEPLOY_ID=$(echo "$DEPLOY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
          echo "Deploy started: $DEPLOY_ID"

          # Wait for deploy to be ready
          for i in {1..15}; do
            STATUS=$(curl -sf "https://api.netlify.com/api/v1/deploys/$DEPLOY_ID" \
              -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" | \
              python3 -c "import sys,json; print(json.load(sys.stdin).get('state',''))")
            echo "Status ($i/15): $STATUS"
            if [ "$STATUS" = "ready" ] || [ "$STATUS" = "current" ]; then
              break
            fi
            sleep 5
          done

          echo ""
          echo "============================================"
          echo "🏡 SITE URL: $SITE_URL"
          echo "============================================"

          echo "## 🏡 Deployed Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**🔗 Site URL:** [$SITE_URL]($SITE_URL)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Page | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| الموقع الرئيسي | [$SITE_URL]($SITE_URL) |" >> $GITHUB_STEP_SUMMARY
          echo "| صفحة العقار + AI | [$SITE_URL/property.html]($SITE_URL/property.html) |" >> $GITHUB_STEP_SUMMARY
